<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ role }} Dashboard | Smart Reimbursement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8f9fa; }
        .dashboard-header { background: #003366; color: white; padding: 2rem 0; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <header class="dashboard-header shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h3 mb-0 fw-bold">Smart Reimbursement</h1>
            <div class="d-flex align-items-center gap-3">
                <span class="badge bg-primary px-3 py-2 rounded-pill">{{ role }}</span>
                <a href="/login" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="card border-0 shadow-sm p-5 rounded-4 text-center">
                    <h2 class="fw-bold mb-3">Welcome to your Dashboard</h2>
                    <p class="text-muted lead">You are logged in as an <strong>{{ role }}</strong>.</p>
                    <hr class="my-4 mx-auto w-25">
                    <p class="small text-muted">Ready to manage your expenses? Let's get started.</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
